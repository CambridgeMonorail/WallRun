<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>The Sign Age</title>
    <script>
      (function () {
        var segmentCount = 1;
        var pathname = window.location.pathname
          .split('/')
          .slice(0, 1 + segmentCount)
          .join('/');
        var rest = window.location.pathname
          .slice(pathname.length)
          .replace(/^\//, '')
          .replace(/&/g, '~and~');
        var search = window.location.search ? '&' + window.location.search.slice(1).replace(/&/g, '~and~') : '';
        var hash = window.location.hash || '';

        window.location.replace(pathname + '/?/' + rest + search + hash);
      })();
    </script>
  </head>
  <body></body>
</html>
