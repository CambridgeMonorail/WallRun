    <script>
      (function () {
        var redirect = window.location.search.slice(1);

        if (!redirect || redirect[0] !== '/') {
          return;
        }

        var decoded = redirect
          .replace(/~and~/g, '&')
          .replace(/\+/g, ' ');
        var basePath = window.location.pathname.endsWith('/')
          ? window.location.pathname.slice(0, -1)
          : window.location.pathname;
        var restoredUrl = basePath + decoded + window.location.hash;

        window.history.replaceState(null, '', restoredUrl);
      })();
    </script>
